<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Victor Chern</title>
    <meta
      name="description"
      content="Solutions architect and software engineer. Backend systems and integrations in TypeScript, Node, and the NetSuite platform."
    />
    <style>
      :root {
        --fg: #1a1a1a;
        --fg-muted: #555;
        --bg: #fafaf7;
        --accent: #1a1a1a;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #e8e8e8;
          --fg-muted: #a0a0a0;
          --bg: #161616;
          --accent: #e8e8e8;
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      main {
        max-width: 36rem;
        width: 100%;
      }
      h1 {
        font-size: 2rem;
        margin: 0 0 1rem 0;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0 0 1.5rem 0;
        color: var(--fg-muted);
        font-size: 1.05rem;
      }
      nav {
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
      }
      a {
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px solid currentColor;
        padding-bottom: 1px;
      }
      a:hover {
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Victor Chern</h1>
      <p>
        Solutions architect and software engineer. I build backend systems and
        integrations in TypeScript and Node. I do all things NetSuite.
      </p>
      <nav>
        <a href="https://github.com/vchern">GitHub</a>
        <a href="https://www.linkedin.com/in/victorchern">LinkedIn</a>
        <a href="mailto:victorschern@gmail.com">Email</a>
      </nav>
    </main>
  </body>
</html>
